services:
  # The Shared redis-server
  redis-server:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"

  # Server Instance 1 (Port 5001)
  backendAlpha:
    build: .
    container_name: backend-1
    environment:
      - Redis__ConnectionString=redis-server:6379
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "5001:8080"
    depends_on:
      - redis-server

  # Server Instance 2 (Port 5002)
  backendBeta:
    build: .
    container_name: backend-2
    environment:
      - Redis__ConnectionString=redis-server:6379
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "5002:8080"
    depends_on:
      - redis-server